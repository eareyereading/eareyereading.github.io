                <h1 class="article-title" itemprop="name">生词提示</h1>
              </header>
              <div class="article-content" itemprop="articleBody">
                <p>使用生词提示功能可以在阅读书籍时在标记为学习的单词下方显示单词解释，方便英语学习者更快地读懂一些有难度的作品。开启【生词提示】后，被用户<strong>标记为学习</strong>的单词下方会自动显示该单词的释义，这样您无需查词即可继续阅读。显示释义时会优先显示中文释义。若该学习无中文释义，将显示英文释义。</p>
<p><em>注意：【生词提示】功能不支持PDF格式的书籍。需8.6.4及以上的听阅版本。</em></p>
