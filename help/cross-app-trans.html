                <h1 class="article-title" itemprop="name">如何跨 App 启用聚合翻译</h1>
              </header>
              <div class="article-content" itemprop="articleBody">
                <p>在其他 App 中选中一段文字后，可快速查看翻译，无需进行 App 切换。</p>
<h3 id="使用步骤" class="article-heading"><a href="#使用步骤" class="headerlink" title="使用步骤"></a>使用步骤<a class="article-anchor" href="#使用步骤" aria-hidden="true"></a></h3><ol>
<li>长按选中要翻译的文字，然后在菜单中点击「共享…」</li>
</ol>
<img src="../images/cross_app_translate_1.png" alt="cross_app_translate_1" width="420">

<ol start="2">
<li>在弹出菜单中点击「编辑操作…」</li>
</ol>
<img src="../images/cross_app_translate_2.png" alt="cross_app_translate_2" width="420">

<ol start="3">
<li>在操作页面开启「聚合翻译」，点按左侧加号，然后点按「完成」</li>
</ol>
<img src="../images/cross_app_translate_3.png" alt="cross_app_translate_3" width="420">

<ol start="4">
<li>在菜单中点击「聚合翻译」即可查看翻译</li>
</ol>
<img src="../images/cross_app_translate_4.png" alt="cross_app_translate_4" width="420">

<ol start="5">
<li>得到翻译结果</li>
</ol>
<img src="../images/cross_app_translate_5.png" alt="cross_app_translate_5" width="420">
