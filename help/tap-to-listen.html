              <div class="article-content" itemprop="articleBody">
                <p>点读版书籍是听阅的一大特色，专门为英语学习者制作，旨在帮助大家提供听说读写能力。书店中，支持点读的书籍会在封面上显示“点读版”的标识。</p>

</ul>
<h2 id="1-何为点读版？" class="article-heading"><a href="#1-何为点读版？" class="headerlink" title="1. 何为点读版？"></a>1. 何为点读版？<a class="article-anchor" href="#1-何为点读版？" aria-hidden="true"></a></h2><ul>
<li><strong>内置真人朗读音频</strong>。这些音频都是由来自美国等以英语为母语的国家的专业人士朗读，声情并茂，引人入胜。</li>
<li><strong>文本和音频对齐</strong>。在播放音频时，当前正在朗读的句子会在书中自动高亮。<em>三击</em>单词，音频会从单词所在的句子开始播放。即：点哪读哪，读哪到哪！</li>
</ul>
