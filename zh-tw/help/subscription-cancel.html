                <h1 class="article-title" itemprop="name">取消會員</h1>
              </header>
              <div class="article-content" itemprop="articleBody">
                <p>開通會員後，在選擇取消之前，會員會自動續訂。您可按照以下步驟取消會員。</p>
<ol>
<li>打開iPhone/iPad，前往“設定”應用&gt;“[您的姓名]”&gt;“iTunes Store與App Store”。</li>
<li>輕點荧幕頂部的Apple ID。</li>
<li>輕點“查看Apple ID”。您可能需要驗證自己的Apple ID。</li>
<li>輕點“訂閱”。</li>
<li>輕點“聽閱”。</li>
<li>輕點“取消訂閱”以取消您的會員。取消後，您的會員將在當前帳單週期結束時停止。</li>
</ol>
<p>若當前您正在使用蘋果手機查看，<a target="_blank" href="https://buy.itunes.apple.com/WebObjects/MZFinance.woa/wa/manageSubscriptions" rel="external nofollow noreferrer noopener">點擊此處</a>即可進入蘋果訂閱取消頁面。</p>
